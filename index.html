<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yolo 11 Performance Testing</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.all.min.js"></script>
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <header>
    <h1>Yolo Performance Testing</h1>
    <span id="model-badge">YOLOv11 Nano · not loaded</span>
    <div class="class-legend">
      <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>cell phone</div>
      <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>person</div>
      <div class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span>laptop</div>
      <div class="legend-item"><span class="legend-dot" style="background:#10b981"></span>book</div>
    </div>
  </header>
  <div id="app">
    <aside id="sidebar">
      <h2>Test categories</h2>
      <div id="cat-list"></div>
    </aside>
    <main id="main">
      <div id="toolbar">
        <div class="backend-select">
          <button id="gpu-toggle" class="active" title="Try WebGPU first (Auto-fallback)">Auto (GPU)</button>
          <button id="cpu-toggle" title="WASM (CPU Only)">CPU Only</button>
        </div>
        <button id="load-btn">Load model</button>
        
        
        <div style="border-left: 1px solid #eee; margin:0 8px; height:24px"></div>
        
        <input type="file" id="local-dataset-input" webkitdirectory directory multiple style="display:none" />
        <button id="upload-btn" title="Upload a YOLO dataset folder (test/val)">Test Local Dataset</button>
        
        <button id="run-btn" class="primary" disabled>Run all</button>

        <button id="run-cat-btn" disabled>Run this category</button>
        <button id="results-btn" disabled>View summary</button>
        <div id="perf-bar">
          <span>Inf <b id="p-inf">—</b></span>
          <span>Prep <b id="p-prep">—</b></span>
          <span>Post <b id="p-post">—</b></span>
          <span>Heap <b id="p-heap">—</b></span>
          <span>FPS <b id="p-fps">—</b></span>
          <span>Cores <b id="p-cpu">—</b></span>
          <span>RAM <b id="p-ram">—</b></span>
          <span>Pressure <b id="p-pressure">—</b></span>
          <span>App Load <b id="p-appload">—</b></span>
          <span id="gpu-container">GPU <b id="p-gpu">—</b></span>
        </div>
      </div>
      <div id="loading">Loading model…</div>
      <div id="content">
        <div id="image-grid"></div>
        <div id="results-section"></div>
      </div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>

</html>
